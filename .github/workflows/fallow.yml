name: CI / Deploy
on: [push, pull_request]

permissions:
  contents: read
  pull-requests: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.19.0
          cache: npm

      - run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: FSD architecture lint (Steiger)
        run: npm run lint:fsd

      - name: Unit tests
        run: npm test

      - name: Set up Java for the Firestore emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Integration tests (Firestore emulator)
        run: npm --prefix apps/api run test:emulator

      - name: i18n catalogs complete
        run: npm --prefix apps/web run i18n:compile

      - name: i18n catalogs extracted
        run: |
          npm --prefix apps/web run i18n:extract
          drift="$(git diff -I '^"POT-Creation-Date' -- apps/web/src/shared/i18n/locales)"
          if [ -n "$drift" ]; then
            echo "::error::i18n catalogs are stale — new messages were added to the code but not extracted. Run 'npm --prefix apps/web run i18n:extract', translate the new messages, and commit the updated .po files."
            echo "$drift"
            exit 1
          fi

  fallow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.19.0
          cache: npm

      - run: npm ci

      - name: Run fallow analysis (SARIF)
        continue-on-error: true
        run: npx fallow --format sarif --quiet > fallow-results.sarif

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: fallow-sarif
          path: fallow-results.sarif

  badge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: fallow
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.19.0
          cache: npm

      - run: npm ci

      - name: Generate health badge JSON
        run: |
          mkdir -p badge-out
          npx fallow health --format json --score --quiet 2>/dev/null \
            | jq '{
                schemaVersion: 1,
                label: "fallow",
                message: "\(.health_score.grade) (\(.health_score.score | floor))",
                color: (
                  if   .health_score.score >= 85 then "brightgreen"
                  elif .health_score.score >= 70 then "green"
                  elif .health_score.score >= 55 then "yellow"
                  elif .health_score.score >= 40 then "orange"
                  else "red" end
                )
              }' > badge-out/health-badge.json

      - name: Publish to badges branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: badges
          publish_dir: ./badge-out
          keep_files: false

  deploy-web:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.19.0
          cache: npm

      - run: npm ci

      - name: Require VITE_API_URL variable
        run: >-
          test -n "${{ vars.VITE_API_URL }}" ||
          { echo "::error::Set the VITE_API_URL repository variable
          (Settings → Secrets and variables → Actions → Variables)"; exit 1; }

      - name: Build web
        env:
          VITE_BASE: /platform/
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_FCM_VAPID_KEY: ${{ vars.VITE_FCM_VAPID_KEY }}
        run: npm --prefix apps/web run build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/dist

      - id: deploy
        uses: actions/deploy-pages@v5

  deploy-firebase:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.19.0
          cache: npm

      - run: npm ci

      - name: Deploy function, Firestore & Storage rules
        env:
          FIREBASE_REFRESH_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          test -n "$FIREBASE_REFRESH_TOKEN" || { echo "::error::Set the FIREBASE_TOKEN secret — generate it with 'firebase login:ci' (Settings → Secrets and variables → Actions)"; exit 1; }
          adc="$RUNNER_TEMP/firebase-adc.json"
          umask 077
          jq -n --arg token "$FIREBASE_REFRESH_TOKEN" '{
            type: "authorized_user",
            client_id: "563584335869-fgrhgmd47bqnekij5i8b5pr03ho849e6.apps.googleusercontent.com",
            client_secret: "j9iVZfS8kkCEFUPaAeJV0sAi",
            refresh_token: $token
          }' > "$adc"
          export GOOGLE_APPLICATION_CREDENTIALS="$adc"
          npx -y firebase-tools@15 deploy --only functions,firestore,storage --project raiymbek-park-sa99 --non-interactive
