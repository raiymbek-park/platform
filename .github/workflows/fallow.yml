name: CI / Deploy
on: [push, pull_request]

permissions:
  contents: read
  pull-requests: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: FSD architecture lint (Steiger)
        run: npm run lint:fsd

      - name: Unit tests
        run: npm test

  fallow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run fallow analysis (SARIF)
        continue-on-error: true
        run: npx fallow --format sarif --quiet > fallow-results.sarif

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: fallow-sarif
          path: fallow-results.sarif

  badge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: fallow
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate health badge JSON
        run: |
          mkdir -p badge-out
          npx fallow health --format json --score --quiet 2>/dev/null \
            | jq '{
                schemaVersion: 1,
                label: "fallow",
                message: "\(.health_score.grade) (\(.health_score.score | floor))",
                color: (
                  if   .health_score.score >= 85 then "brightgreen"
                  elif .health_score.score >= 70 then "green"
                  elif .health_score.score >= 55 then "yellow"
                  elif .health_score.score >= 40 then "orange"
                  else "red" end
                )
              }' > badge-out/health-badge.json

      - name: Publish to badges branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: badges
          publish_dir: ./badge-out
          keep_files: false

  deploy-web:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Require VITE_API_URL variable
        run: >-
          test -n "${{ vars.VITE_API_URL }}" ||
          { echo "::error::Set the VITE_API_URL repository variable
          (Settings → Secrets and variables → Actions → Variables)"; exit 1; }

      - name: Build web
        env:
          VITE_BASE: /platform/
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm --prefix apps/web run build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/dist

      - id: deploy
        uses: actions/deploy-pages@v5

  deploy-firebase:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy function, Firestore & Storage rules
        run: >-
          npx -y firebase-tools@15 deploy
          --only functions,firestore,storage
          --project raiymbek-park-sa99
          --non-interactive
